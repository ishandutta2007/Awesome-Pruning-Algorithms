<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="accent-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8" />
    </linearGradient>
    
    <linearGradient id="accent-grad-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)" />

  <!-- Animated Glowing Shapes (Dynamic Aspect) -->
  <circle cx="100" cy="50" r="80" fill="url(#accent-grad-2)" filter="url(#glow)">
    <animate attributeName="cy" values="50;70;50" dur="8s" repeatCount="indefinite" />
    <animate attributeName="r" values="80;90;80" dur="8s" repeatCount="indefinite" />
  </circle>

  <circle cx="700" cy="180" r="100" fill="url(#accent-grad-1)" filter="url(#glow)">
    <animate attributeName="cx" values="700;680;700" dur="10s" repeatCount="indefinite" />
    <animate attributeName="r" values="100;110;100" dur="10s" repeatCount="indefinite" />
  </circle>

  <!-- Decorative Grid Line -->
  <path d="M 0,125 Q 200,60 400,125 T 800,125" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="5 5" />
  
  <!-- Animated Wave Line (Dynamic Aspect) -->
  <path d="M 0,150 Q 200,90 400,150 T 800,150" fill="none" stroke="url(#accent-grad-1)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="d" 
             values="M 0,150 Q 200,90 400,150 T 800,150;
                     M 0,150 Q 200,210 400,150 T 800,150;
                     M 0,150 Q 200,90 400,150 T 800,150" 
             dur="12s" 
             repeatCount="indefinite" />
  </path>

  <!-- Neural Network Pruning Nodes & Connections (Concept Themed) -->
  <!-- Layer 1 -->
  <line x1="120" y1="80" x2="220" y2="60" stroke="#4b5563" stroke-width="1" />
  <line x1="120" y1="120" x2="220" y2="60" stroke="#4b5563" stroke-dasharray="3 3" stroke-width="0.75" opacity="0.4" /> <!-- Pruned Connection -->
  <line x1="120" y1="160" x2="220" y2="180" stroke="#4b5563" stroke-width="1" />

  <!-- Layer 2 -->
  <line x1="220" y1="60" x2="320" y2="120" stroke="#4b5563" stroke-width="1" />
  <line x1="220" y1="180" x2="320" y2="120" stroke="#4b5563" stroke-width="1" />

  <!-- Nodes -->
  <circle cx="120" cy="80" r="5" fill="#3b82f6" />
  <circle cx="120" cy="120" r="5" fill="#4b5563" opacity="0.5" /> <!-- Pruned Node -->
  <circle cx="120" cy="160" r="5" fill="#3b82f6" />
  
  <circle cx="220" cy="60" r="6" fill="#8b5cf6" />
  <circle cx="220" cy="180" r="6" fill="#8b5cf6" />
  
  <circle cx="320" cy="120" r="7" fill="#ec4899" />

  <!-- Title & Subtitle -->
  <text x="400" y="110" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="34" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    AWESOME PRUNING
  </text>
  <text x="400" y="150" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="20" fill="#a78bfa" text-anchor="middle" letter-spacing="1">
    ALGORITHMS in AI
  </text>

  <!-- Pulsating connection markers -->
  <circle cx="220" cy="60" r="10" fill="none" stroke="#8b5cf6" stroke-width="1">
    <animate attributeName="r" values="6;15;6" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
